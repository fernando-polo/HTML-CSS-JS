<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github fetch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">Hola, soy el Header</header>

    <main class="main">
        <section class="search">
            <img src="images/github_logo.png" alt="GitHub Logo" class="search__image">

            <h1 class="search__title">Search for a User on GitHub!</h1>

            <form action="" class="search__form">
                <input type="text" placeholder="Username" class="search__input">
                <button class="search__button">ícono de búsqueda</button>
            </form>

            <article class="user-card">
                <img class="user-card__avatar" src="" alt="User avatar">

                <div class="user-card__info">
                    <h2 class="user-card__name">Nombre del usuario</h2>
                    <p class="user-card__bio">Bio del usuario</p>                 
                </div>
            </article>
        </section>
    </main>

    <footer class="footer">Hola soy el footer</footer>


    <script src="main.js"></script>
</body>
</html>
