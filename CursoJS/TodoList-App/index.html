<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Todo-list</title>
</head>
<body>
    <header>
        HEADER
    </header>
    <main>

        <h1>Todo List App</h1>

        <form id="formBuscarTareas">
            <fieldset>
                <legend>Buscar Tareas</legend>
                <input type="text" id="inputSearchTask" placeholder="Ingresa tarea a buscar">
                <button id="btnSearch">Buscar Tarea</button>
            </fieldset>
        </form>

        <form id="formCrearTareas">
            <fieldset>
                <legend>Añadir Tareas</legend>
                <input type="text" id="inputTask" placeholder="Ingresa tarea nueva">
                <button id="btnAdd">Añadir tarea</button>
            </fieldset>
        </form>

        <div id="listDiv"></div>

    </main>
    <footer>
        FOOTER
    </footer>
    <script src="main.js"></script>
</body>
</html>
