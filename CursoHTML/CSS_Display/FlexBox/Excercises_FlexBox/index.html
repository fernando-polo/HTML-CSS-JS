<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios - Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="">MiSITIO</a>            
            <ul class="navbar-links">
                <li><a href="" class="navbar-link">Inicio</a></li>
                <li><a href="" class="navbar-link">Productos</a></li>
                <li><a href="" class="navbar-link">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <h1>Tarjetas de presentación</h1>
        <section class="section-cards">
            <div class="card">
                <article>
                    <h2>Producto A</h2>
                    <img src="" alt="">
                    <p>Este producto es muy bueno.</p>
                </article>
            </div>
            <div class="card">
                <article>
                    <h2>Producto B</h2>
                    <img src="" alt="">
                    <p>Este producto es muy bueno.</p>
                </article>
            </div>
            <div class="card">
                <article>
                    <h2>Producto C</h2>
                    <img src="" alt="">
                    <p>Este producto es muy bueno.</p>
                </article>
            </div>
        </section>

        <div class="container-btn">
            <button>Hola, soy un btn</button>
        </div>

        <h2> Layout con sidebar</h2>
        <div id="dashboard">
            <section id="sidebar">
                Soy un sidebar
            </section>
            <section id="contenido">
                Soy el contenido
            </section>
        </div>

        <h2>Formulario con campos alineados</h2>
        <form action="" id="formulario">
            <fieldset id="datos-personales">
                <legend>Datos personales</legend>
                <input type="text" id="nombre" name="nombre" placeholder="Nombre">
                <input type="text" id="apellido" name="apellido" placeholder="Apellido">
            </fieldset>
            <input type="email" id="email" name="email" placeholder="Email">
            <div id="botones">
                <button>Cancelar</button>
                <button>Guardar</button>
            </div>
        </form>




    </main>
    
</body>
</html>
